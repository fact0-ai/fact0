name: SDK Python

on:
  push:
    tags: ["sdk/python/v*"]
    paths:
      - "sdk/python/**"
      - ".github/workflows/sdk-python.yml"
  pull_request:
    paths:
      - "sdk/python/**"
      - ".github/workflows/sdk-python.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e '.[dev]'
      - run: pytest -q

  publish:
    needs: test
    if: startsWith(github.ref, 'refs/tags/sdk/python/v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install 'build>=1.2' 'twine>=6.1' 'packaging>=24.2'
      - run: python -m build
      - run: twine check dist/*
      - name: Show built metadata
        run: |
          python - <<'PY'
          import zipfile
          from pathlib import Path
          for path in sorted(Path("dist").glob("*.whl")):
              with zipfile.ZipFile(path) as zf:
                  meta = next(n for n in zf.namelist() if n.endswith(".dist-info/METADATA"))
                  print(f"=== {path.name} ===")
                  print(zf.read(meta).decode().split("\n\n", 1)[0])
                  print()
          PY
      - run: twine upload dist/* --skip-existing --verbose
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
